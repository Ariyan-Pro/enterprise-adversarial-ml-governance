name: Security CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit (Static Analysis)
        run: |
          bandit -r . -x ./venv,./archive_before_phase5_20260112_153116 -f json -o bandit-report.json || true
          bandit -r . -x ./venv,./archive_before_phase5_20260112_153116 || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Check Dependencies for Vulnerabilities (Safety)
        run: |
          safety check --json > safety-report.json || echo '{}' > safety-report.json
          safety check || true

      - name: Audit Python Packages (pip-audit)
        run: |
          pip-audit --format json > pip-audit-report.json || echo '[]' > pip-audit-report.json
          pip-audit || true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.json

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,archive_before_phase5_20260112_153116,.git || true

      - name: Run Black (Format Check)
        run: |
          black --check --diff . \
            --exclude="venv|archive_before_phase5_20260112_153116" || true

      - name: Run Isort (Import Sort Check)
        run: |
          isort --check-only --diff . \
            --skip=venv --skip=archive_before_phase5_20260112_153116 || true

  dependency-check:
    name: Dependency Version Pinning Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check requirements.txt for pinned versions
        run: |
          echo "Checking for unpinned dependencies..."
          if grep -E "^[a-zA-Z].*>=|^[a-zA-Z].*<" requirements.txt; then
            echo "⚠️ Warning: Some dependencies use flexible version constraints"
            echo "Consider pinning to exact versions for reproducibility"
          else
            echo "✅ All dependencies appear to be properly constrained"
          fi

      - name: Check pyproject.toml for pinned versions
        run: |
          echo "Checking pyproject.toml dependencies..."
          if grep -E '"[a-zA-Z].*>=' pyproject.toml | grep -v "=="; then
            echo "⚠️ Warning: Some dependencies in pyproject.toml use flexible constraints"
          else
            echo "✅ pyproject.toml dependencies look good"
          fi

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
