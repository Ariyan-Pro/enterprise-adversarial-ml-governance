version: '3.8'

services:
  adversarial-ml-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: adversarial-ml-security-api
    ports:
      - "${HTTPS_PORT:-8443}:8443"
    environment:
      - ENVIRONMENT=production
      - SECURITY_LEVEL=enterprise
      - LOG_LEVEL=INFO
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}  # Must be set in production with a strong random value (min 32 bytes hex)
      - SSL_CERT_FILE=/etc/ssl/certs/server.crt
      - SSL_KEY_FILE=/etc/ssl/private/server.key
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://localhost:3000,https://localhost:8080}
    volumes:
      - ../reports:/app/reports
      - ../logs:/app/logs
      - ../data:/app/data
      - ${SSL_CERT_PATH:-./ssl/certs}:/etc/ssl/certs:ro
      - ${SSL_KEY_PATH:-./ssl/private}:/etc/ssl/private:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl; import requests; requests.get('https://localhost:8443/api/health', timeout=2, verify='/etc/ssl/certs/server.crt')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - adversarial-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Redis for caching (optional)
  redis-cache:
    image: redis:7-alpine
    container_name: adversarial-redis-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - adversarial-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: adversarial-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - adversarial-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: adversarial-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    networks:
      - adversarial-network

networks:
  adversarial-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
